name: Bug report
description: Report a reproducible bug in the platform or one of the games
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Platform server
        - Host screen
        - Phone controller
        - Shared protocol/packages
        - Local game repo
        - Setup/build tooling
        - Documentation
        - Unsure
    validations:
      required: true

  - type: input
    id: game
    attributes:
      label: Game
      description: If this is game-specific, name the game repo or game id.
      placeholder: magic-arena, schaetzorama, minions-td, ...
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Browser:
        - Node.js:
        - npm:
        - Host/controller devices:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or clips
      description: Paste logs or attach screenshots/clips if useful.
      render: shell
    validations:
      required: false

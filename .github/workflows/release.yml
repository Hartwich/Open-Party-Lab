name: Portable release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  windows-portable:
    name: Build Windows portable package
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out platform
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install platform dependencies
        run: npm ci

      - name: Clone every known game
        run: npm run games:clone-all

      - name: Typecheck complete platform
        run: npm run typecheck

      - name: Build same-origin release assets
        shell: pwsh
        run: |
          $env:OPEN_PARTY_LAB_RELEASE_BUILD = "1"
          npm run build

      - name: Assemble portable runtime
        run: npm run release:windows

      - name: Create ZIP and checksum
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/Open-Party-Lab-windows-x64/* -DestinationPath artifacts/Open-Party-Lab-windows-x64.zip
          (Get-FileHash artifacts/Open-Party-Lab-windows-x64.zip -Algorithm SHA256).Hash.ToLower() + "  Open-Party-Lab-windows-x64.zip" | Set-Content artifacts/Open-Party-Lab-windows-x64.zip.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Open-Party-Lab-windows-x64
          path: |
            artifacts/Open-Party-Lab-windows-x64.zip
            artifacts/Open-Party-Lab-windows-x64.zip.sha256

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/Open-Party-Lab-windows-x64.zip
            artifacts/Open-Party-Lab-windows-x64.zip.sha256
